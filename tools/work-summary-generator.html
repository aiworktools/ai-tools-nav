<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作总结生成器 - 一键生成专业工作总结 | AI办公效率工具箱</title>
    <meta name="description" content="工作总结生成器，一键生成专业的工作日报、周报、月报、项目总结。包含完成情况、问题风险、下阶段计划等完整结构。">
    <meta name="keywords" content="工作总结,周报生成,日报模板,月报,项目总结,AI办公">
    <link rel="canonical" href="https://www.aitools.ren/tools/work-summary-generator.html">
    <link rel="stylesheet" href="../style.css">
    <style>
        .tool-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .tool-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .tool-header h1 {
            font-size: 2rem;
            color: var(--gray-800);
            margin-bottom: 12px;
        }
        .tool-header p {
            color: var(--gray-600);
            font-size: 1.1rem;
        }
        .tool-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 768px) {
            .tool-layout {
                grid-template-columns: 1fr;
            }
        }
        .input-section {
            background: white;
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-md);
            max-height: 700px;
            overflow-y: auto;
        }
        .output-section {
            background: white;
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-md);
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gray-700);
            font-size: 0.95rem;
        }
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
        }
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .btn-secondary {
            width: 100%;
            padding: 12px 24px;
            background: var(--gray-100);
            color: var(--gray-700);
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: var(--gray-200);
        }
        .output-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .output-box {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 20px;
            min-height: 500px;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--gray-700);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="tool-page">
        <a href="index.html" class="back-link">← 返回AI效率工具</a>
        
        <div class="tool-header">
            <h1>📝 工作总结生成器</h1>
            <p>一键生成专业的工作日报、周报、月报</p>
        </div>

        <div class="tool-layout">
            <div class="input-section">
                <div class="input-group">
                    <label>总结类型</label>
                    <select id="summaryType">
                        <option value="daily">工作日报</option>
                        <option value="weekly">工作周报</option>
                        <option value="monthly">工作月报</option>
                        <option value="project">项目总结</option>
                        <option value="quarterly">季度总结</option>
                        <option value="annual">年度总结</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>汇报人</label>
                    <input type="text" id="reporter" placeholder="您的姓名">
                </div>
                <div class="input-group">
                    <label>部门/岗位</label>
                    <input type="text" id="department" placeholder="例如：产品部/产品经理">
                </div>
                <div class="input-group">
                    <label>汇报周期</label>
                    <input type="text" id="period" placeholder="例如：2024年1月第1周">
                </div>
                
                <div class="input-group">
                    <label>主要完成工作（每行一项）</label>
                    <textarea id="completedWork" placeholder="例如：
完成产品需求文档撰写
组织并主持需求评审会议
跟进开发进度，解决3个阻塞问题"></textarea>
                </div>
                
                <div class="input-group">
                    <label>正在进行的工作</label>
                    <textarea id="ongoingWork" placeholder="例如：
用户调研报告整理中
新版本功能规划"></textarea>
                </div>
                
                <div class="input-group">
                    <label>遇到的问题/风险</label>
                    <textarea id="problems" placeholder="例如：
第三方接口对接延迟，可能影响上线时间
资源不足，需要协调增加人手"></textarea>
                </div>
                
                <div class="input-group">
                    <label>下周/下阶段计划</label>
                    <textarea id="plans" placeholder="例如：
完成用户调研报告
启动新版本开发
组织团队培训"></textarea>
                </div>
                
                <div class="input-group">
                    <label>需要支持/协调的事项</label>
                    <textarea id="support" placeholder="例如：
需要设计资源支持
希望领导协调跨部门合作"></textarea>
                </div>
                
                <div class="input-group">
                    <label>心得体会/自我评价（可选）</label>
                    <textarea id="reflection" placeholder="例如：
本周在项目管理方面有所进步
需要加强数据分析能力"></textarea>
                </div>
                
                <button class="btn-primary" onclick="generateSummary()">生成总结</button>
                <button class="btn-secondary" onclick="copySummary()">复制内容</button>
            </div>

            <div class="output-section">
                <div class="output-title">📋 生成结果</div>
                <div class="output-box" id="output">点击"生成总结"按钮，工作总结将显示在这里...</div>
            </div>
        </div>
    </div>

    <!-- Baidu Analytics -->
    <script>

    <script>
        function generateSummary() {
            const type = document.getElementById('summaryType').value;
            const reporter = document.getElementById('reporter').value || '【汇报人】';
            const department = document.getElementById('department').value || '【部门/岗位】';
            const period = document.getElementById('period').value || '【汇报周期】';
            const completedWork = document.getElementById('completedWork').value;
            const ongoingWork = document.getElementById('ongoingWork').value;
            const problems = document.getElementById('problems').value;
            const plans = document.getElementById('plans').value;
            const support = document.getElementById('support').value;
            const reflection = document.getElementById('reflection').value;

            const typeNames = {
                daily: '工作日报',
                weekly: '工作周报',
                monthly: '工作月报',
                project: '项目总结',
                quarterly: '季度总结',
                annual: '年度总结'
            };

            let summary = `${typeNames[type]}

汇报人：${reporter}
部门/岗位：${department}
汇报周期：${period}
汇报日期：${new Date().toLocaleDateString('zh-CN')}
`;

            if (completedWork.trim()) {
                summary += `
一、工作完成情况
`;
                const items = completedWork.split('\n').filter(item => item.trim());
                items.forEach((item, index) => {
                    summary += `${index + 1}. ${item.trim()}\n`;
                });
            }

            if (ongoingWork.trim()) {
                summary += `
二、正在进行的工作
`;
                const items = ongoingWork.split('\n').filter(item => item.trim());
                items.forEach((item, index) => {
                    summary += `${index + 1}. ${item.trim()}\n`;
                });
            }

            if (problems.trim()) {
                summary += `
三、问题与风险
`;
                const items = problems.split('\n').filter(item => item.trim());
                items.forEach((item, index) => {
                    summary += `${index + 1}. ${item.trim()}\n`;
                });
            }

            if (plans.trim()) {
                summary += `
四、下阶段工作计划
`;
                const items = plans.split('\n').filter(item => item.trim());
                items.forEach((item, index) => {
                    summary += `${index + 1}. ${item.trim()}\n`;
                });
            }

            if (support.trim()) {
                summary += `
五、需要支持/协调的事项
`;
                const items = support.split('\n').filter(item => item.trim());
                items.forEach((item, index) => {
                    summary += `${index + 1}. ${item.trim()}\n`;
                });
            }

            if (reflection.trim()) {
                summary += `
六、心得体会/自我评价
`;
                const items = reflection.split('\n').filter(item => item.trim());
                items.forEach((item, index) => {
                    summary += `${index + 1}. ${item.trim()}\n`;
                });
            }

            if (type === 'project') {
                summary += `
项目成果概述：
【请补充项目关键成果、数据指标等】

项目经验总结：
【请补充项目中的经验教训、最佳实践等】
`;
            } else if (type === 'quarterly' || type === 'annual') {
                summary += `
关键业绩指标：
【请补充KPI完成情况、重要数据等】

能力提升情况：
【请补充技能提升、培训学习等】

下阶段目标：
【请补充下一阶段的工作目标】
`;
            }

            summary += `
---
以上为本期${typeNames[type]}，请领导审阅。如有任何问题，欢迎随时沟通。谢谢！

汇报人：${reporter}
${new Date().toLocaleDateString('zh-CN')}`;

            document.getElementById('output').textContent = summary;
        }

        function copySummary() {
            const output = document.getElementById('output').textContent;
            if (output === '点击"生成总结"按钮，工作总结将显示在这里...') {
                alert('请先生成工作总结');
                return;
            }
            navigator.clipboard.writeText(output).then(() => {
                alert('工作总结已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }
    </script>
</body>
</html>
